<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Builder — OpenLov</title>
    <link rel="stylesheet" href="../../shared/css/variables.css">
    <link rel="stylesheet" href="../../shared/css/layout.css">
    <style>
        .ai-container { max-width: 600px; margin: auto; text-align: center; background: #000; color: #fff; padding: 30px; border-radius: 20px; border: 1px solid #e8420a; }
        .prompt-res { background: #1a1a1b; padding: 15px; border-radius: 10px; margin-top: 20px; color: #ff9d00; font-family: monospace; border-left: 4px solid #e8420a; text-align: left; }
    </style>
</head>
<body>
    <nav><a href="/" class="logo">OpenLov ai</a></nav>
    <div class="ai-container">
        <h2 style="color:#e8420a">🚩 Epic Video Prompt Builder</h2>
        <p>Create scene-by-scene prompts for Hanuman Chalisa or Movie Teasers.</p>
        <button onclick="getPrompt()" class="main-btn" style="background:#e8420a; color:white; border:none; padding:15px 30px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%">Generate Jai Hanuman Teaser Prompt</button>
        <div id="res" class="prompt-res">Click the button to generate...</div>
    </div>

    <script type="module">
        import { generateEpicPrompt } from '../../shared/js/calculators.js';
        window.getPrompt = () => {
            const prompt = generateEpicPrompt('hanuman');
            document.getElementById('res').innerText = prompt;
        };
    </script>
</body>
</html>
