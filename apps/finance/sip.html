<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator — OpenLov Finance</title>
    <link rel="stylesheet" href="../../shared/css/variables.css">
    <link rel="stylesheet" href="../../shared/css/layout.css">
</head>
<body>
    <nav><a href="/" class="logo">OpenLov Finance</a></nav>
    <div style="max-width: 500px; margin: auto; padding: 30px; border: 1px solid #eee; border-radius: 20px;">
        <h2>💰 SIP Calculator</h2>
        <input type="number" id="monthly" placeholder="Monthly Investment (₹)" style="width:100%; margin:10px 0; padding:12px;">
        <input type="number" id="rate" placeholder="Expected Return Rate (%)" style="width:100%; margin:10px 0; padding:12px;">
        <input type="number" id="years" placeholder="Time Period (Years)" style="width:100%; margin:10px 0; padding:12px;">
        <button onclick="calcSIP()" class="main-btn" style="width:100%; padding:15px; background:#e8420a; color:white; border:none; border-radius:10px; cursor:pointer;">Calculate Wealth</button>
        <div id="res" style="margin-top:20px; font-size:1.5rem; font-weight:bold; color:#e8420a;">₹ 0</div>
    </div>

    <script type="module">
        import OL_CALCS from '../../shared/js/calculators.js';
        window.calcSIP = () => {
            const p = document.getElementById('monthly').value;
            const r = document.getElementById('rate').value;
            const n = document.getElementById('years').value * 12;
            if(p && r && n) {
                const total = OL_CALCS.sip(p, r, n);
                document.getElementById('res').innerText = '₹ ' + Math.round(total).toLocaleString('en-IN');
            }
        };
    </script>
</body>
</html>
