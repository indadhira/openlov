<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Sports Hub — OpenLov</title>
    <link rel="stylesheet" href="../../shared/css/variables.css">
    <link rel="stylesheet" href="../../shared/css/layout.css">
</head>
<body>
    <nav><div class="logo">OpenLov Sports</div></nav>
    <main>
        <section id="live-ticker" style="background: #000; color: #0f0; padding: 10px; margin-bottom: 20px; border-radius: 8px; font-family: monospace;">
            Loading Live Scores...
        </section>
        
        <h2>Sports Tools</h2>
        <div id="tool-list-container"></div>
    </main>

    <script type="module">
        import API_HANDLER from '../../shared/js/api-handler.js';
        import OL_CONFIG from '../../shared/js/config.js';

        // 1. Fetch Live Score
        const ticker = document.getElementById('live-ticker');
        API_HANDLER.fetchCricket().then(data => {
            ticker.innerText = `🏏 ${data.match}: ${data.score} | ${data.status}`;
        });

        // 2. Load Sports Tools
        const container = document.getElementById('tool-list-container');
        const sports = OL_CONFIG.categories.find(c => c.id === 'sports');
        sports.tools.forEach(tool => {
            const a = document.createElement('a');
            a.href = `/${tool}`;
            a.className = 'tool-link-card';
            a.innerHTML = `<h3>${tool.toUpperCase().replace('-', ' ')}</h3>`;
            container.appendChild(a);
        });
    </script>
</body>
</html>
